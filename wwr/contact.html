<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting | Contact Us</title>
    <meta name="description" content="Contact us here for any questions!">
    <meta name="author" content="Branden Graffagnino">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="site-header">
        <img src="images/wwr-logo.jpg" alt="WWR Logo" class="logo">

        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="company-info">
            <h1>White Water Rafting</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 480 999 9999</p>
            <p>
                <a href="mailto:info@whitewaterrafting.com">
                    info@whitewaterrafting.com
                </a>
            </p>
        </section>

        <section class="contact-layout">
            <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6582.144071409395!2d-118.5984213252414!3d34.42492529796154!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80c280a5bffa65c5%3A0x8f03c1443c734740!2sSix%20Flags%20Magic%20Mountain!5e0!3m2!1sen!2sus!4v1775946171968!5m2!1sen!2sus"
                  width="400" height="300" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <div class="form-container">
                <form>

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <fieldset>
                        <legend>Message Purpose</legend>

                        <label>
                            <input type="radio" name="purpose" required>
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" name="purpose">
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" name="purpose">
                            Website Suggestion
                        </label>
                    </fieldset>

                    <label for="message">Message</label>
                    <textarea id="message" rows="4"></textarea>

                    <label class="checkbox-label">
                        <input type="checkbox">
                        Please Subscribe me to the monthly newsletter
                    </label>

                    <button type="submit" class="submit-btn">
                        Get in Touch!
                    </button>

                </form>
            </div>

        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-profiles">
                <figure>
                    <img src="images/wwr-happy-clients.jpg" alt="River Guide">
                    <figcaption>River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/wwr-happy-clients.jpg" alt="Trip Coordinator">
                    <figcaption>Trip Coordinator</figcaption>
                </figure>

                <figure>
                    <img src="images/wwr-happy-clients.jpg" alt="Safety Manager">
                    <figcaption>Safety Manager</figcaption>
                </figure>
            </div>
        </section>

    </main>
    <footer>
        <p>©2026 🌊 White Water Rafting 🌊 Branden Graffagnino</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook Icon" width="100">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.jpg" alt="LinkedIn Icon" width="100">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram Icon" width="100">
            </a>
        </nav>
    </footer>
</body>

</html>
